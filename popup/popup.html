<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Groove Harness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #d1d5db;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #1f2937;
      background: #111827;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f3f4f6;
    }
    .header .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #065f46;
      color: #6ee7b7;
    }
    .header .badge.zero { background: #7f1d1d; color: #fca5a5; }
    .actions {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
      border-bottom: 1px solid #1f2937;
    }
    .actions button {
      flex: 1;
      padding: 6px 10px;
      font-size: 11px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #9ca3af;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .actions button:hover { background: #374151; color: #f3f4f6; }
    .actions button.primary { background: #1e3a5f; color: #93c5fd; border-color: #2563eb; }
    .actions button.primary:hover { background: #1e40af; }
    .services { max-height: 360px; overflow-y: auto; }
    .service {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid #111827;
      transition: background 0.1s;
    }
    .service:hover { background: #111827; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #34d399; }
    .dot.not_found { background: #4b5563; }
    .dot.error { background: #f87171; }
    .service-info { flex: 1; min-width: 0; }
    .service-name {
      font-size: 12px;
      font-weight: 500;
      color: #e5e7eb;
    }
    .service-caps {
      font-size: 10px;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .service-port {
      font-size: 10px;
      color: #4b5563;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .empty {
      padding: 24px 14px;
      text-align: center;
      color: #4b5563;
      font-size: 12px;
    }
    .footer {
      padding: 8px 14px;
      border-top: 1px solid #1f2937;
      font-size: 10px;
      color: #374151;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Groove Harness</h1>
    <span id="count-badge" class="badge zero">0 connected</span>
  </div>
  <div class="actions">
    <button id="btn-probe" class="primary">Probe All</button>
  </div>
  <div id="services" class="services">
    <div class="empty">Probing local services...</div>
  </div>
  <div class="footer">
    Idris2-verified &middot; localhost only &middot; no data leaves your machine
  </div>
  <script src="popup.js"></script>
</body>
</html>
